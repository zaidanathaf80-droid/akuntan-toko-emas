<!doctype html>
<html>
  <head>
    <title>Test Frontend-Backend Connection</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f5f5;
        padding: 20px;
      }
      .container {
        max-width: 600px;
        margin: 0 auto;
        background: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      h1 {
        color: #333;
        margin-bottom: 10px;
      }
      .info {
        color: #666;
        margin-bottom: 30px;
      }
      .status {
        padding: 15px;
        border-radius: 6px;
        margin-bottom: 20px;
      }
      .success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }
      .error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }
      .loading {
        background: #d1ecf1;
        color: #0c5460;
        border: 1px solid #bee5eb;
      }
      pre {
        background: #f8f9fa;
        padding: 15px;
        border-radius: 4px;
        overflow: auto;
        font-size: 12px;
      }
      .test-section {
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid #eee;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🔌 Frontend-Backend Connection Test</h1>
      <div class="info">
        Testing if your frontend can reach your backend API
      </div>

      <div id="status" class="status loading">Checking connection...</div>

      <div class="test-section">
        <h3>Response Data:</h3>
        <pre id="response">Loading...</pre>
      </div>
    </div>

    <script>
      async function testConnection() {
        const statusDiv = document.getElementById("status");
        const responseDiv = document.getElementById("response");

        try {
          const apiUrl = "http://127.0.0.1:8000/api/transactions";
          console.log("Testing connection to:", apiUrl);

          const response = await fetch(apiUrl, {
            method: "GET",
            headers: {
              Accept: "application/json",
              "Content-Type": "application/json",
            },
          });

          console.log("Response status:", response.status);
          const data = await response.json();

          if (response.ok && Array.isArray(data)) {
            statusDiv.className = "status success";
            statusDiv.innerHTML = `✅ <strong>Connected!</strong> Backend is responding with ${data.length} transactions.`;
            responseDiv.textContent = JSON.stringify(data, null, 2);
          } else {
            statusDiv.className = "status error";
            statusDiv.innerHTML = `❌ <strong>Error ${response.status}:</strong> ${response.statusText}`;
            responseDiv.textContent = JSON.stringify(data, null, 2);
          }
        } catch (error) {
          console.error("Connection test failed:", error);
          statusDiv.className = "status error";
          statusDiv.innerHTML = `❌ <strong>Failed to connect:</strong> ${error.message}<br>Make sure backend is running at http://127.0.0.1:8000`;
          responseDiv.textContent = error.toString();
        }
      }

      // Run test when page loads
      testConnection();
    </script>
  </body>
</html>
